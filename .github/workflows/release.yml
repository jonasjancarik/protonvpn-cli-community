name: Auto Release

on:
  push:
    branches:
      - master
    paths:
      - 'protonvpn_cli/constants.py'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep 'VERSION =' protonvpn_cli/constants.py | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> "${GITHUB_OUTPUT}"
          echo "Detected version: $VERSION"

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Generate release notes
        run: python3 scripts/generate_release_notes.py "v${{ steps.get_version.outputs.VERSION }}" > release-notes.md

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          bodyFile: release-notes.md
          allowUpdates: false
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Latest Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin refs/tags/latest

      # Tags created with GITHUB_TOKEN do not trigger the Docker workflow, so
      # auto releases publish the stable image tags directly here.
      - name: Install cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.get_version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.version=v${{ steps.get_version.outputs.VERSION }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          while IFS= read -r tag; do
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"
